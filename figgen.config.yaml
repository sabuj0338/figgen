framework: nextjs16
boilerplate_url: "https://github.com/sabuj0338/nextjs-light-boilerplate.git"
package_manager: "pnpm"

# Optional: route planning and coding to different models to control cost.
# Falls back to DEFAULT_MODEL / provider default when empty.
planner_model: ""
coder_model: ""

planner_rules:
  - "rules/planning_rules_summary.md"
# Only the condensed ruleset is injected into every coder call to save tokens.
# The full setup guide (nextjs-project-setup-guide-light.md) is kept for humans
# and intentionally NOT sent to the model.
coder_rules:
  - "./rules/coder_rules_condensed.md"
dependencies:
  ui:
    - shadcn
    - tailwindcss
    - lucide-react

  state:
    - zustand
    - react-query

  forms:
    - react-hook-form
    - zod

rules:
  - never_edit_shadcn_ui
  - use_react_query_for_api
  - use_zustand_only_for_ui
  - follow_folder_structure
  # translation rules (i18next)
  - must_add_text_into_translation_file
  - update_component_to_work_with_translation_file

  # css rules
  - use_tailwind_css
